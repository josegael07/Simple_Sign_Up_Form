<!DOCTYPE html>
<html lang="en">

    <title>Sign Up Form</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>


    <div class="entire-container">

            <div class="logo">
                <img src="./images/odin-logo.png">
